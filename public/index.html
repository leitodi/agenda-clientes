<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navegación -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">📅 Agenda de Clientes</div>
        </div>
    </nav>

    <div class="container">
        <div class="agenda-wrapper">
            <!-- Sección de Formulario -->
            <section class="formulario-section">
                <h2>Agregar Cliente</h2>
                <form id="clienteForm" class="form-cliente">
                    <div class="form-group">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" placeholder="Nombre del cliente" required>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono:</label>
                        <input type="tel" id="telefono" placeholder="Número de teléfono" required>
                    </div>

                    <div class="form-group">
                        <label for="instagram">Instagram:</label>
                        <input type="text" id="instagram" placeholder="@usuario_instagram">
                    </div>

                    <div class="form-group fotos-group">
                        <label>Foto 1:</label>
                        <div class="foto-container">
                            <input type="file" id="foto1" accept="image/*" class="foto-input">
                            <label for="foto1" class="foto-label">+ Cargar Foto 1</label>
                            <img id="preview-foto1" class="foto-preview" alt="Vista previa">
                        </div>
                    </div>

                    <div class="form-group fotos-group">
                        <label>Foto 2:</label>
                        <div class="foto-container">
                            <input type="file" id="foto2" accept="image/*" class="foto-input">
                            <label for="foto2" class="foto-label">+ Cargar Foto 2</label>
                            <img id="preview-foto2" class="foto-preview" alt="Vista previa">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                </form>
            </section>

            <!-- Sección de Listado y Detalles -->
            <section class="listado-section">
                <h2>Mis Clientes</h2>
                
                <div class="listado-container">
                    <!-- Listado de Clientes -->
                    <div class="clientes-list-wrapper">
                        <div id="clientesList" class="clientes-list">
                            <p class="empty-message">Cargando clientes...</p>
                        </div>
                    </div>

                    <!-- Detalles del Cliente -->
                    <div class="cliente-detalles-wrapper">
                        <div id="clienteDetalles" class="cliente-detalles">
                            <p class="empty-message">Selecciona un cliente para ver los detalles</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal para ver fotos en grande -->
    <div id="fotoModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-fotos">
                <img id="modalFoto1" class="modal-foto" alt="Foto 1">
                <img id="modalFoto2" class="modal-foto" alt="Foto 2">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
